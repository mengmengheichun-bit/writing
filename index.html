
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { padding: 1.5rem 0; max-width: 680px; }
.tabs { display: flex; border-bottom: 1.5px solid var(--color-border-tertiary); margin-bottom: 2rem; }
.tab-btn { font-size: 15px; font-weight: 500; padding: 10px 28px; background: transparent; border: none; border-bottom: 3px solid transparent; margin-bottom: -1.5px; cursor: pointer; color: var(--color-text-secondary); transition: color 0.15s, border-color 0.15s; }
.tab-btn.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); }
.tab-btn:hover:not(.active) { color: var(--color-text-primary); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.upload-area { border: 1.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 2.5rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: var(--color-background-secondary); }
.upload-area:hover, .upload-area.drag { border-color: var(--color-text-primary); background: var(--color-background-tertiary); }
.upload-area i { font-size: 36px; color: var(--color-text-secondary); margin-bottom: 12px; display: block; }
.upload-area p { font-size: 14px; color: var(--color-text-secondary); }
.upload-area strong { color: var(--color-text-primary); }
input[type=file] { display: none; }
.name-input { width: 100%; font-size: 15px; padding: 10px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); margin-bottom: 1rem; }
.name-input:focus { outline: none; border-color: var(--color-border-primary); }
.name-input::placeholder { color: var(--color-text-tertiary); }
.add-row { display: flex; gap: 10px; margin-bottom: 1rem; }
.add-row .name-input { margin: 0; }
.submit-btn { font-size: 14px; font-weight: 500; padding: 10px 18px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); cursor: pointer; white-space: nowrap; }
.submit-btn:hover { opacity: 0.85; }
.essay-list { margin-top: 2rem; }
.essay-list-title { font-size: 13px; color: var(--color-text-secondary); font-weight: 500; margin-bottom: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
.essay-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: border-color 0.15s; }
.essay-card:hover { border-color: var(--color-border-primary); }
.essay-card .meta { flex: 1; min-width: 0; }
.essay-card .ename { font-size: 15px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.essay-card .emeta { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.essay-card .actions { display: flex; gap: 8px; }
.icon-btn { background: none; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--color-text-secondary); font-size: 15px; transition: background 0.15s, color 0.15s; }
.icon-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.icon-btn.del:hover { color: #E24B4A; border-color: #E24B4A; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--color-text-tertiary); font-size: 14px; }
.empty-state i { font-size: 40px; display: block; margin-bottom: 12px; }
.reader-modal { display: none; position: fixed; inset: 0; z-index: 100; background: var(--color-background-primary); overflow-y: auto; }
.reader-modal.open { display: block; }
.reader-header { position: sticky; top: 0; background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); padding: 10px 1.5rem; display: flex; align-items: center; gap: 10px; z-index: 10; flex-wrap: wrap; }
.reader-header .r-title { font-size: 15px; font-weight: 500; flex: 1; min-width: 120px; }
.r-badge { font-size: 12px; padding: 3px 10px; border-radius: 99px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.tts-bar { display: flex; align-items: center; gap: 8px; }
.tts-play-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; transition: background 0.15s; white-space: nowrap; }
.tts-play-btn:hover { background: var(--color-background-secondary); }
.tts-play-btn i { font-size: 16px; }
.tts-play-btn.playing { background: var(--color-background-secondary); }
.speed-wrap { display: flex; align-items: center; gap: 6px; }
.speed-label { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
.speed-val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); min-width: 30px; text-align: right; }
input[type=range].speed-slider { width: 80px; height: 4px; cursor: pointer; accent-color: var(--color-text-primary); }
.progress-bar-wrap { height: 2px; background: var(--color-border-tertiary); }
.progress-bar { height: 2px; background: var(--color-text-primary); width: 0%; transition: width 0.3s linear; }
.reader-body { max-width: 720px; margin: 0 auto; padding: 2.5rem 2rem 6rem; font-size: 16px; line-height: 1.9; color: var(--color-text-primary); white-space: pre-wrap; word-break: break-word; }
.reader-body .highlight { background: rgba(255, 220, 80, 0.35); border-radius: 3px; transition: background 0.2s; }
</style>

<div class="app">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('task1',this)">Task 1</button>
    <button class="tab-btn" onclick="switchTab('task2',this)">Task 2</button>
  </div>
  <div id="task1" class="tab-panel active">
    <div class="add-row">
      <input class="name-input" id="name1" type="text" placeholder="Tên bài essay (VD: Environmental pollution – Band 7.5)">
      <button class="submit-btn" onclick="triggerUpload('file1')"><i class="ti ti-upload" aria-hidden="true"></i> Tải lên</button>
    </div>
    <div class="upload-area" id="drop1" onclick="triggerUpload('file1')" ondragover="onDrag(event,'drop1')" ondragleave="offDrag('drop1')" ondrop="onDrop(event,'1')">
      <i class="ti ti-file-text" aria-hidden="true"></i>
      <p><strong>Kéo thả file vào đây</strong> hoặc nhấn để chọn</p>
      <p style="margin-top:6px;font-size:13px">Hỗ trợ .txt</p>
    </div>
    <input type="file" id="file1" accept=".txt" onchange="loadFile(event,'1')">
    <div class="essay-list" id="list1">
      <div class="essay-list-title">Bài đã lưu</div>
      <div class="empty-state" id="empty1"><i class="ti ti-inbox" aria-hidden="true"></i>Chưa có bài nào</div>
    </div>
  </div>
  <div id="task2" class="tab-panel">
    <div class="add-row">
      <input class="name-input" id="name2" type="text" placeholder="Tên bài essay (VD: Technology and society – Band 8.0)">
      <button class="submit-btn" onclick="triggerUpload('file2')"><i class="ti ti-upload" aria-hidden="true"></i> Tải lên</button>
    </div>
    <div class="upload-area" id="drop2" onclick="triggerUpload('file2')" ondragover="onDrag(event,'drop2')" ondragleave="offDrag('drop2')" ondrop="onDrop(event,'2')">
      <i class="ti ti-file-text" aria-hidden="true"></i>
      <p><strong>Kéo thả file vào đây</strong> hoặc nhấn để chọn</p>
      <p style="margin-top:6px;font-size:13px">Hỗ trợ .txt</p>
    </div>
    <input type="file" id="file2" accept=".txt" onchange="loadFile(event,'2')">
    <div class="essay-list" id="list2">
      <div class="essay-list-title">Bài đã lưu</div>
      <div class="empty-state" id="empty2"><i class="ti ti-inbox" aria-hidden="true"></i>Chưa có bài nào</div>
    </div>
  </div>
</div>

<div class="reader-modal" id="reader">
  <div class="reader-header">
    <button class="icon-btn" onclick="closeReader()" aria-label="Đóng"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
    <span class="r-title" id="r-title"></span>
    <span class="r-badge" id="r-badge"></span>
    <div class="tts-bar">
      <div class="speed-wrap">
        <span class="speed-label">Tốc độ</span>
        <input type="range" class="speed-slider" id="speed-slider" min="0.5" max="2" step="0.1" value="1" oninput="updateSpeed(this.value)">
        <span class="speed-val" id="speed-val">1.0x</span>
      </div>
      <button class="tts-play-btn" id="tts-btn" onclick="toggleTTS()">
        <i class="ti ti-player-play" id="tts-icon" aria-hidden="true"></i>
        <span id="tts-label">Đọc bài</span>
      </button>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="reader-body" id="r-body"></div>
</div>

<script>
const store = { '1': [], '2': [] };
let tts = { utt: null, playing: false, sentences: [], idx: 0, rate: 1.0, spans: [] };

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}
function triggerUpload(id) { document.getElementById(id).click(); }
function onDrag(e, d) { e.preventDefault(); document.getElementById(d).classList.add('drag'); }
function offDrag(d) { document.getElementById(d).classList.remove('drag'); }
function onDrop(e, tab) { e.preventDefault(); offDrag('drop'+tab); const f=e.dataTransfer.files[0]; if(f) processFile(f,tab); }
function loadFile(e, tab) { const f=e.target.files[0]; if(f) processFile(f,tab); e.target.value=''; }

function processFile(file, tab) {
  const r = new FileReader();
  r.onload = function(e) {
    const nameEl = document.getElementById('name'+tab);
    const name = nameEl.value.trim() || file.name.replace('.txt','');
    store[tab].push({ id: Date.now(), name, content: e.target.result, date: new Date().toLocaleDateString('vi-VN') });
    nameEl.value = '';
    renderList(tab);
  };
  r.readAsText(file, 'UTF-8');
}

function renderList(tab) {
  const list = document.getElementById('list'+tab);
  const empty = document.getElementById('empty'+tab);
  list.querySelectorAll('.essay-card').forEach(e => e.remove());
  if (!store[tab].length) { empty.style.display=''; return; }
  empty.style.display = 'none';
  store[tab].forEach(essay => {
    const card = document.createElement('div');
    card.className = 'essay-card';
    card.innerHTML = `<div class="meta"><div class="ename">${essay.name}</div><div class="emeta">Ngày thêm: ${essay.date} &nbsp;·&nbsp; ${essay.content.split(/\s+/).filter(Boolean).length} từ</div></div><div class="actions"><button class="icon-btn" title="Đọc" onclick="openReader(${tab},${essay.id})"><i class="ti ti-book-open" aria-hidden="true"></i></button><button class="icon-btn del" title="Xoá" onclick="deleteEssay(${tab},${essay.id})"><i class="ti ti-trash" aria-hidden="true"></i></button></div>`;
    list.appendChild(card);
  });
}

function openReader(tab, id) {
  stopTTS();
  const essay = store[tab].find(e => e.id === id);
  if (!essay) return;
  document.getElementById('r-title').textContent = essay.name;
  document.getElementById('r-badge').textContent = 'Task ' + tab;
  const body = document.getElementById('r-body');
  const sentences = essay.content.match(/[^.!?]+[.!?]+[\s]*/g) || [essay.content];
  tts.sentences = sentences;
  tts.spans = [];
  body.innerHTML = '';
  sentences.forEach((s, i) => {
    const span = document.createElement('span');
    span.textContent = s;
    span.dataset.idx = i;
    body.appendChild(span);
    tts.spans.push(span);
  });
  document.getElementById('reader').classList.add('open');
  document.getElementById('reader').scrollTop = 0;
  document.getElementById('progress-bar').style.width = '0%';
}

function closeReader() {
  stopTTS();
  document.getElementById('reader').classList.remove('open');
}

function updateSpeed(val) {
  tts.rate = parseFloat(val);
  document.getElementById('speed-val').textContent = parseFloat(val).toFixed(1) + 'x';
  if (tts.playing) {
    const idx = tts.idx;
    stopTTS();
    tts.idx = idx;
    startTTS();
  }
}

function toggleTTS() {
  if (tts.playing) { stopTTS(); return; }
  startTTS();
}

function startTTS() {
  if (!window.speechSynthesis) { alert('Trình duyệt không hỗ trợ đọc văn bản.'); return; }
  if (tts.idx >= tts.sentences.length) tts.idx = 0;
  tts.playing = true;
  setPlayUI(true);
  readNext();
}

function readNext() {
  if (!tts.playing || tts.idx >= tts.sentences.length) {
    stopTTS(true);
    return;
  }
  tts.spans.forEach(s => s.classList.remove('highlight'));
  const span = tts.spans[tts.idx];
  if (span) {
    span.classList.add('highlight');
    span.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  const pct = Math.round((tts.idx / tts.sentences.length) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  const utt = new SpeechSynthesisUtterance(tts.sentences[tts.idx]);
  utt.lang = 'en-US';
  utt.rate = tts.rate;
  utt.onend = function() { tts.idx++; readNext(); };
  utt.onerror = function() { tts.idx++; readNext(); };
  tts.utt = utt;
  window.speechSynthesis.speak(utt);
}

function stopTTS(finished) {
  tts.playing = false;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  tts.spans.forEach(s => s.classList.remove('highlight'));
  setPlayUI(false);
  if (finished) {
    tts.idx = 0;
    document.getElementById('progress-bar').style.width = '100%';
    setTimeout(() => document.getElementById('progress-bar').style.width = '0%', 800);
  }
}

function setPlayUI(playing) {
  document.getElementById('tts-icon').className = playing ? 'ti ti-player-pause' : 'ti ti-player-play';
  document.getElementById('tts-label').textContent = playing ? 'Dừng' : 'Đọc bài';
  document.getElementById('tts-btn').classList.toggle('playing', playing);
}

function deleteEssay(tab, id) {
  store[tab] = store[tab].filter(e => e.id !== id);
  renderList(tab);
}
</script>
