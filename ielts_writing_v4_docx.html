
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1.5rem 0;font-family:var(--font-sans)}
.app-title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.app-sub{font-size:13px;color:var(--color-text-secondary);margin-top:2px;margin-bottom:1.5rem}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem}
.tab-btn{font-size:13px;font-weight:500;padding:7px 20px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.tab-btn:hover:not(.active){background:var(--color-background-secondary);color:var(--color-text-primary)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.field-row{display:flex;gap:8px;margin-bottom:12px}
.field-row input[type=text]{flex:1;font-size:14px;padding:9px 13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.field-row input[type=text]:focus{outline:none;border-color:var(--color-border-primary)}
.field-row input[type=text]::placeholder{color:var(--color-text-tertiary)}
.btn-up{font-size:13px;font-weight:500;padding:9px 16px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.btn-up:hover{opacity:.85}
.upload-zone{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1.75rem 1.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--color-background-secondary);margin-bottom:1.5rem}
.upload-zone:hover,.upload-zone.drag{border-color:var(--color-text-primary);background:var(--color-background-tertiary)}
.upload-zone i{font-size:26px;color:var(--color-text-tertiary);margin-bottom:8px;display:block}
.uz-main{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.uz-sub{font-size:12px;color:var(--color-text-tertiary);margin-top:4px}
.fmt-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);margin:6px 3px 0}
input[type=file]{display:none}
.sec-lbl{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.essay-grid{display:flex;flex-direction:column;gap:8px}
.e-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;transition:border-color .15s}
.e-card:hover{border-color:var(--color-border-primary)}
.e-ico{width:36px;height:36px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.e-ico i{font-size:17px;color:var(--color-text-secondary)}
.e-ico.docx-ico{background:#E6F1FB}
.e-ico.docx-ico i{color:#185FA5}
.e-meta{flex:1;min-width:0}
.e-name{font-size:14px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-info{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
.e-acts{display:flex;gap:6px}
.ic-btn{width:30px;height:30px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-secondary);font-size:14px;transition:all .15s}
.ic-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.ic-btn.danger:hover{border-color:#E24B4A;color:#E24B4A}
.empty{text-align:center;padding:2.5rem 1rem}
.empty i{font-size:32px;color:var(--color-text-tertiary);display:block;margin-bottom:8px}
.empty p{font-size:13px;color:var(--color-text-tertiary)}
.reader-wrap{display:none;min-height:500px;flex-direction:column;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-top:1.25rem}
.reader-wrap.open{display:flex}
.r-topbar{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-wrap:wrap;row-gap:8px}
.r-back{width:30px;height:30px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-text-secondary);font-size:15px;flex-shrink:0;transition:all .15s}
.r-back:hover{color:var(--color-text-primary)}
.r-name{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1;min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-badge{font-size:11px;padding:3px 9px;border-radius:99px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);white-space:nowrap}
.tts-row{display:flex;align-items:center;gap:8px;margin-left:auto}
.spd-grp{display:flex;align-items:center;gap:5px}
.spd-lbl{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.spd-num{font-size:12px;font-weight:500;color:var(--color-text-primary);min-width:28px;text-align:right}
input[type=range].spd{width:70px;accent-color:var(--color-text-primary)}
.tts-btn{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;white-space:nowrap;transition:all .15s}
.tts-btn:hover{background:var(--color-background-tertiary)}
.tts-btn.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.prog-track{height:2px;background:var(--color-border-tertiary);flex-shrink:0}
.prog-fill{height:2px;background:var(--color-text-primary);width:0%;transition:width .3s linear}
.r-body{padding:2rem 2rem 3rem;font-size:16px;line-height:1.95;color:var(--color-text-primary);overflow-y:auto;max-height:420px;flex:1;word-break:break-word}
.r-body.plain{white-space:pre-wrap}
.r-body .hl{background:rgba(255,213,60,.3);border-radius:3px}
.r-body p{margin-bottom:.75rem}
.r-body h1,.r-body h2,.r-body h3{font-weight:500;margin-bottom:.5rem;margin-top:1rem}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--color-text-primary);color:var(--color-background-primary);font-size:13px;padding:8px 18px;border-radius:99px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>

<div class="wrap">
  <div class="app-title">IELTS Writing</div>
  <div class="app-sub">Kho lưu bài essay của tôi</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('t1',this)">Task 1</button>
    <button class="tab-btn" onclick="switchTab('t2',this)">Task 2</button>
  </div>

  <div id="t1" class="tab-panel active">
    <div class="field-row">
      <input id="n1" type="text" placeholder="Tên bài — VD: Bar chart – Tourism statistics">
      <button class="btn-up" onclick="pick('f1')"><i class="ti ti-upload" aria-hidden="true"></i>Tải lên</button>
    </div>
    <div class="upload-zone" id="dz1" onclick="pick('f1')" ondragover="dg(event,'dz1')" ondragleave="og('dz1')" ondrop="dp(event,'1')">
      <i class="ti ti-file-arrow-up" aria-hidden="true"></i>
      <div class="uz-main">Kéo thả file vào đây hoặc nhấn để chọn</div>
      <div style="margin-top:8px">
        <span class="fmt-badge"><i class="ti ti-file-text" style="font-size:11px" aria-hidden="true"></i>.txt</span>
        <span class="fmt-badge"><i class="ti ti-file-word" style="font-size:11px" aria-hidden="true"></i>.docx</span>
      </div>
    </div>
    <input type="file" id="f1" accept=".txt,.docx" onchange="lf(event,'1')">
    <div class="sec-lbl">Bài đã lưu</div>
    <div class="essay-grid" id="g1"><div class="empty"><i class="ti ti-inbox" aria-hidden="true"></i><p>Chưa có bài nào — hãy tải lên bài đầu tiên</p></div></div>
  </div>

  <div id="t2" class="tab-panel">
    <div class="field-row">
      <input id="n2" type="text" placeholder="Tên bài — VD: Technology and society – Band 8.0">
      <button class="btn-up" onclick="pick('f2')"><i class="ti ti-upload" aria-hidden="true"></i>Tải lên</button>
    </div>
    <div class="upload-zone" id="dz2" onclick="pick('f2')" ondragover="dg(event,'dz2')" ondragleave="og('dz2')" ondrop="dp(event,'2')">
      <i class="ti ti-file-arrow-up" aria-hidden="true"></i>
      <div class="uz-main">Kéo thả file vào đây hoặc nhấn để chọn</div>
      <div style="margin-top:8px">
        <span class="fmt-badge"><i class="ti ti-file-text" style="font-size:11px" aria-hidden="true"></i>.txt</span>
        <span class="fmt-badge"><i class="ti ti-file-word" style="font-size:11px" aria-hidden="true"></i>.docx</span>
      </div>
    </div>
    <input type="file" id="f2" accept=".txt,.docx" onchange="lf(event,'2')">
    <div class="sec-lbl">Bài đã lưu</div>
    <div class="essay-grid" id="g2"><div class="empty"><i class="ti ti-inbox" aria-hidden="true"></i><p>Chưa có bài nào — hãy tải lên bài đầu tiên</p></div></div>
  </div>

  <div class="reader-wrap" id="reader">
    <div class="r-topbar">
      <button class="r-back" onclick="closeR()" aria-label="Quay lại"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
      <span class="r-name" id="rname"></span>
      <span class="r-badge" id="rbadge"></span>
      <div class="tts-row">
        <div class="spd-grp">
          <span class="spd-lbl">Tốc độ</span>
          <input type="range" class="spd" id="spd" min="0.5" max="2" step="0.1" value="1" oninput="setSpd(this.value)">
          <span class="spd-num" id="spdv">1.0×</span>
        </div>
        <button class="tts-btn" id="ttsBtn" onclick="toggleTTS()">
          <i class="ti ti-player-play" id="ttsIco" aria-hidden="true"></i>
          <span id="ttsTxt">Đọc bài</span>
        </button>
      </div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
    <div class="r-body" id="rbody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const store={'1':[],'2':[]};
const tts={playing:false,rate:1,idx:0,sentences:[],spans:[]};
let curIsHtml=false;

function switchTab(id,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
  closeR();
}
function pick(id){document.getElementById(id).click()}
function dg(e,id){e.preventDefault();document.getElementById(id).classList.add('drag')}
function og(id){document.getElementById(id).classList.remove('drag')}
function dp(e,tab){e.preventDefault();og('dz'+tab);const f=e.dataTransfer.files[0];if(f)proc(f,tab)}
function lf(e,tab){const f=e.target.files[0];if(f)proc(f,tab);e.target.value=''}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function proc(file,tab){
  const ni=document.getElementById('n'+tab);
  const name=ni.value.trim()||file.name.replace(/\.(txt|docx)$/i,'');
  const isDocx=file.name.toLowerCase().endsWith('.docx');
  if(isDocx){
    if(typeof mammoth==='undefined'){showToast('Thư viện chưa tải xong, thử lại');return}
    const ar=new FileReader();
    ar.onload=e=>{
      mammoth.convertToHtml({arrayBuffer:e.target.result}).then(res=>{
        const wc=res.value.replace(/<[^>]+>/g,' ').split(/\s+/).filter(Boolean).length;
        store[tab].push({id:Date.now(),name,content:res.value,type:'html',tab,wc,date:new Date().toLocaleDateString('vi-VN')});
        ni.value='';render(tab);showToast('Đã tải lên '+name);
      }).catch(()=>showToast('Không đọc được file .docx'));
    };
    ar.readAsArrayBuffer(file);
  } else {
    const r=new FileReader();
    r.onload=e=>{
      const txt=e.target.result;
      store[tab].push({id:Date.now(),name,content:txt,type:'text',tab,wc:txt.split(/\s+/).filter(Boolean).length,date:new Date().toLocaleDateString('vi-VN')});
      ni.value='';render(tab);showToast('Đã tải lên '+name);
    };
    r.readAsText(file,'UTF-8');
  }
}

function render(tab){
  const grid=document.getElementById('g'+tab);
  grid.innerHTML='';
  if(!store[tab].length){
    grid.innerHTML='<div class="empty"><i class="ti ti-inbox" aria-hidden="true"></i><p>Chưa có bài nào — hãy tải lên bài đầu tiên</p></div>';
    return;
  }
  store[tab].forEach(e=>{
    const isDocx=e.type==='html';
    const d=document.createElement('div');
    d.className='e-card';
    d.innerHTML=`<div class="e-ico${isDocx?' docx-ico':''}"><i class="ti ${isDocx?'ti-file-word':'ti-file-text'}" aria-hidden="true"></i></div><div class="e-meta"><div class="e-name">${e.name}</div><div class="e-info">${e.date} &nbsp;·&nbsp; ${e.wc} từ &nbsp;·&nbsp; <span style="font-size:11px;padding:1px 6px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-tertiary)">${isDocx?'.docx':'.txt'}</span></div></div><div class="e-acts"><button class="ic-btn" title="Đọc" onclick="event.stopPropagation();openR(${tab},${e.id})"><i class="ti ti-book-open" aria-hidden="true"></i></button><button class="ic-btn danger" title="Xoá" onclick="event.stopPropagation();del(${tab},${e.id})"><i class="ti ti-trash" aria-hidden="true"></i></button></div>`;
    d.addEventListener('click',()=>openR(tab,e.id));
    grid.appendChild(d);
  });
}

function openR(tab,id){
  stopTTS();
  const e=store[tab].find(x=>x.id===id);
  if(!e)return;
  document.getElementById('rname').textContent=e.name;
  document.getElementById('rbadge').textContent='Task '+tab;
  const body=document.getElementById('rbody');
  curIsHtml=e.type==='html';
  if(curIsHtml){
    body.className='r-body';
    body.innerHTML=e.content;
    const allText=body.innerText||body.textContent||'';
    const sents=allText.match(/[^.!?]+[.!?]+\s*/g)||[allText];
    tts.sentences=sents;tts.spans=[];tts.idx=0;
    body.innerHTML='';
    const tmp=document.createElement('div');
    tmp.innerHTML=e.content;
    const walker=document.createTreeWalker(tmp,NodeFilter.SHOW_TEXT);
    let fullText='';
    while(walker.nextNode())fullText+=walker.currentNode.textContent;
    const ss=fullText.match(/[^.!?]+[.!?]+\s*/g)||[fullText];
    tts.sentences=ss;tts.spans=[];tts.idx=0;
    body.innerHTML=e.content;
    const textNodes=[];
    const w2=document.createTreeWalker(body,NodeFilter.SHOW_TEXT);
    while(w2.nextNode())textNodes.push(w2.currentNode);
    let si=0,rem=ss[0]||'',spans=[];
    textNodes.forEach(tn=>{
      let t=tn.textContent,pos=0;
      while(pos<t.length&&si<ss.length){
        const need=rem.length,have=t.length-pos;
        if(have>=need){
          const sp=document.createElement('span');
          sp.textContent=t.slice(pos,pos+need);
          sp.dataset.i=si;
          tn.parentNode.insertBefore(sp,tn);
          spans.push(sp);tts.spans.push(sp);
          pos+=need;si++;
          if(si<ss.length)rem=ss[si];else rem='';
        } else {
          const sp=document.createElement('span');
          sp.textContent=t.slice(pos);
          sp.dataset.i=si;
          tn.parentNode.insertBefore(sp,tn);
          spans.push(sp);
          rem=rem.slice(have);pos=t.length;
        }
      }
      tn.remove();
    });
    if(tts.spans.length===0){
      ss.forEach((s,i)=>{const sp=document.createElement('span');sp.textContent=s;sp.dataset.i=i;body.appendChild(sp);tts.spans.push(sp)});
    }
  } else {
    body.className='r-body plain';
    const sents=e.content.match(/[^.!?]+[.!?]+\s*/g)||[e.content];
    tts.sentences=sents;tts.spans=[];tts.idx=0;
    body.innerHTML='';
    sents.forEach((s,i)=>{const sp=document.createElement('span');sp.textContent=s;sp.dataset.i=i;body.appendChild(sp);tts.spans.push(sp)});
  }
  document.getElementById('reader').classList.add('open');
  document.getElementById('prog').style.width='0%';
  body.scrollTop=0;
}

function closeR(){stopTTS();document.getElementById('reader').classList.remove('open')}

function setSpd(v){
  tts.rate=parseFloat(v);
  document.getElementById('spdv').textContent=parseFloat(v).toFixed(1)+'×';
  if(tts.playing){const i=tts.idx;stopTTS();tts.idx=i;startTTS()}
}
function toggleTTS(){tts.playing?stopTTS():startTTS()}
function startTTS(){
  if(!window.speechSynthesis){showToast('Trình duyệt chưa hỗ trợ đọc văn bản');return}
  if(tts.idx>=tts.sentences.length)tts.idx=0;
  tts.playing=true;
  document.getElementById('ttsBtn').classList.add('on');
  document.getElementById('ttsIco').className='ti ti-player-pause';
  document.getElementById('ttsTxt').textContent='Dừng';
  next();
}
function next(){
  if(!tts.playing||tts.idx>=tts.sentences.length){stopTTS(true);return}
  tts.spans.forEach(s=>s.classList.remove('hl'));
  const sp=tts.spans[tts.idx];
  if(sp){sp.classList.add('hl');sp.scrollIntoView({behavior:'smooth',block:'center'})}
  document.getElementById('prog').style.width=Math.round(tts.idx/tts.sentences.length*100)+'%';
  const u=new SpeechSynthesisUtterance(tts.sentences[tts.idx]);
  u.lang='en-US';u.rate=tts.rate;
  u.onend=()=>{tts.idx++;next()};
  u.onerror=()=>{tts.idx++;next()};
  tts.utt=u;window.speechSynthesis.speak(u);
}
function stopTTS(done){
  tts.playing=false;
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  tts.spans.forEach(s=>s.classList.remove('hl'));
  document.getElementById('ttsBtn').classList.remove('on');
  document.getElementById('ttsIco').className='ti ti-player-play';
  document.getElementById('ttsTxt').textContent='Đọc bài';
  if(done){tts.idx=0;document.getElementById('prog').style.width='100%';setTimeout(()=>document.getElementById('prog').style.width='0%',800)}
}
function del(tab,id){if(tts.playing)stopTTS();store[tab]=store[tab].filter(e=>e.id!==id);render(tab)}
</script>
